<div class="container mt-4">
  <h2 class="mb-3">Trip Listings</h2>

  <a class="btn btn-primary mb-3" routerLink="/add">Add Trip</a>

  <p *ngIf="trips" class="text-muted">Trips loaded: {{ trips.length }}</p>

  <div *ngIf="trips.length === 0" class="alert alert-warning">
    No trips available.
  </div>

  <div class="row" *ngIf="trips.length > 0">
    <div class="col-md-4 mb-3" *ngFor="let trip of trips">
      <app-trip-card [trip]="trip"></app-trip-card>
    </div>
  </div>
</div>
