<div class="container mt-4" *ngIf="trip">
  <h2>Edit Trip</h2>

  <form (ngSubmit)="save()">
    <input class="form-control mb-2" [(ngModel)]="trip.name" name="name" />
    <input class="form-control mb-2" [(ngModel)]="trip.img" name="img" />
    <textarea class="form-control mb-2" [(ngModel)]="trip.description" name="description"></textarea>

    <button class="btn btn-primary">Save</button>
    <a routerLink="/" class="btn btn-secondary ms-2">Cancel</a>
  </form>
</div>
