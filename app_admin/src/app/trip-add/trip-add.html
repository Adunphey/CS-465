<div class="container mt-4">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <h2 class="m-0">Add Trip</h2>
    <a routerLink="/" class="btn btn-outline-secondary btn-sm">Back</a>
  </div>

  <div *ngIf="errorMsg" class="alert alert-danger">
    {{ errorMsg }}
  </div>

  <form (ngSubmit)="addTrip()" #tripForm="ngForm" class="card p-3">
    <div class="mb-3">
      <label class="form-label">Trip Name *</label>
      <input
        type="text"
        class="form-control"
        name="name"
        [(ngModel)]="name"
        required
      />
    </div>

    <div class="mb-3">
      <label class="form-label">Image Path (optional)</label>
      <input
        type="text"
        class="form-control"
        name="img"
        [(ngModel)]="img"
        placeholder="/images/reef1.jpg (or leave blank)"
      />
      <div class="form-text">
        Your API currently stores image as <code>img</code>. You can leave this blank for now.
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label">Description *</label>
      <textarea
        class="form-control"
        name="description"
        [(ngModel)]="description"
        rows="4"
        required
      ></textarea>
    </div>

    <div class="d-flex gap-2">
      <button class="btn btn-primary" type="submit" [disabled]="isSaving || !tripForm.form.valid">
        {{ isSaving ? 'Saving...' : 'Add Trip' }}
      </button>

      <button class="btn btn-outline-secondary" type="button" (click)="cancel()" [disabled]="isSaving">
        Cancel
      </button>
    </div>
  </form>
</div>
